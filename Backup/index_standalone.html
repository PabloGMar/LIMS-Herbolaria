<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIMS Herbolaria - Supabase Version</title>

    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .loader {
            border-top-color: currentColor;
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .slide-up {
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @media print {
            @page { size: letter portrait; margin: 0.5cm; }
            body { background: white !important; }
            body * { visibility: hidden; }
            #modalCertificadoOverlay, #modalCertificadoOverlay * { visibility: visible; }
            #modalCertificadoOverlay { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; background: white !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-100 via-slate-50 to-green-50 text-slate-800">

    <!-- Content from Index.html (Dashboard & Login) -->
    <div id="loginSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-card shadow-2xl rounded-3xl p-8 md:p-10 border border-slate-100 w-full max-w-md">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-200">
                    <i class="fas fa-leaf text-3xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">LIMS Herbolaria</h1>
                <p class="text-slate-500 text-sm mt-1">Gestión Inteligente de Laboratorio (Direct Supabase)</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1">Usuario</label>
                    <input type="text" id="usuario" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all duration-200 bg-white" placeholder="ej. analista_01">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1">Contraseña</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all duration-200 bg-white" placeholder="••••••••">
                </div>
                <div id="loginError" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100"></div>
                <button type="submit" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center">
                    <span id="btnLoginText">Ingresar</span>
                    <div id="btnLoginLoader" class="hidden loader rounded-full border-2 border-t-2 border-white/30 h-5 w-5 ml-3"></div>
                </button>
            </form>
        </div>
    </div>

    <div id="dashboardSection" class="hidden min-h-screen p-4 md:p-8 max-w-[1600px] mx-auto">
        <div class="flex flex-col lg:flex-row gap-8 xl:gap-12">
            <!-- Sidebar -->
            <aside class="w-full lg:w-80 shrink-0 space-y-6">
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-5">Menú Principal</h3>
                    <div class="flex flex-col gap-3">
                        <button onclick="cambiarTab('Cuarentena')" class="w-full justify-start bg-blue-50 hover:bg-blue-600 text-blue-700 hover:text-white px-4 py-3 rounded-xl font-bold transition-all flex items-center gap-3">
                            <i class="fas fa-home w-5 text-center text-lg"></i> <span>Dashboard</span>
                        </button>
                        <button onclick="toggleVistaInventarios()" class="w-full justify-start bg-slate-50 hover:bg-blue-600 text-slate-700 hover:text-white px-4 py-3 rounded-xl font-bold transition-all flex items-center gap-3">
                            <i class="fas fa-boxes w-5 text-center text-lg"></i> <span>Inventarios</span>
                        </button>
                        <button id="btnNavUsuarios" onclick="toggleVistaUsuarios()" class="w-full justify-start bg-slate-50 hover:bg-purple-600 text-slate-700 hover:text-white px-4 py-3 rounded-xl font-bold transition-all flex items-center gap-3">
                            <i class="fas fa-users w-5 text-center text-lg"></i> <span>Usuarios</span>
                        </button>
                        <button id="btnNavAudit" onclick="toggleVistaAuditTrail()" class="w-full justify-start bg-slate-50 hover:bg-slate-800 text-slate-700 hover:text-white px-4 py-3 rounded-xl font-bold transition-all flex items-center gap-3">
                            <i class="fas fa-shield-alt w-5 text-center text-lg"></i> <span>Audit Trail</span>
                        </button>
                        <button id="btnNavEquipos" onclick="toggleVistaEquipos()" class="w-full justify-start bg-slate-50 hover:bg-slate-800 text-slate-700 hover:text-white px-4 py-3 rounded-xl font-bold transition-all flex items-center gap-3">
                            <i class="fas fa-microscope w-5 text-center text-lg"></i> <span>Equipos</span>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <div class="flex-1 w-full overflow-hidden">
                <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold text-slate-800">LIMS Dashboard</h1>
                        <p class="text-slate-500 mt-2 flex items-center flex-wrap gap-2">
                            <span>Bienvenido/a, <span id="welcomeUser" class="font-bold text-blue-600">Usuario</span></span>
                            <span class="text-slate-300">|</span>
                            <span id="userRoleBadge" class="bg-slate-200 text-slate-700 px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wider">Rol</span>
                        </p>
                    </div>
                    <button onclick="cerrarSesion()" class="text-sm text-red-500 hover:text-red-700 hover:bg-red-50 px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-colors">
                        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                    </button>
                </header>

                <!-- Views Container (Same as original) -->
                <div id="vistasContainer" class="relative">
                    <!-- Vista Muestras (Default) -->
                    <div id="vistaMuestras" class="fade-in block">
                        <!-- KPI Cards -->
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 md:gap-4 mb-8">
                            <div onclick="cambiarTab('Cuarentena')" class="kpi-card cursor-pointer bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-3 border-b-4 border-b-amber-400">
                                <div class="p-2.5 bg-amber-100 rounded-xl text-amber-600"><i class="fas fa-box"></i></div>
                                <div><p class="text-slate-500 text-[10px] font-bold uppercase">Cuarentena</p><p id="kpiCuarentena" class="text-xl font-bold">-</p></div>
                            </div>
                            <div onclick="cambiarTab('En Análisis')" class="kpi-card cursor-pointer bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-3 border-b-4 border-b-blue-400">
                                <div class="p-2.5 bg-blue-50 rounded-xl text-blue-500"><i class="fas fa-flask"></i></div>
                                <div><p class="text-slate-500 text-[10px] font-bold uppercase">En Análisis</p><p id="kpiAnalisis" class="text-xl font-bold">-</p></div>
                            </div>
                            <!-- ... other KPIs ... -->
                        </div>

                        <!-- Table -->
                        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                            <div class="border-b border-slate-200 bg-slate-50/80 flex justify-between items-center px-6 py-3">
                                <h3 class="font-bold text-slate-700" id="tituloTablaActiva">Cuarentena</h3>
                                <button onclick="cargarMuestras()" class="text-slate-500 p-2 rounded-lg border border-slate-200 bg-white"><i class="fas fa-sync-alt"></i></button>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-slate-50 text-slate-500 uppercase text-xs font-semibold" id="tablaMuestrasHead"></thead>
                                    <tbody id="tablaMuestrasBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Other Views (Users, Inventory, etc.) -->
                    <section id="vistaUsuarios" class="hidden fade-in bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden p-6">
                        <h3 class="text-xl font-bold mb-4">Gestión de Usuarios</h3>
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50">
                                <tr><th>ID</th><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Estatus</th></tr>
                            </thead>
                            <tbody id="tablaUsuariosBody"></tbody>
                        </table>
                    </section>

                    <section id="vistaInventarios" class="hidden fade-in bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden p-6">
                        <h3 class="text-xl font-bold mb-4">Inventarios</h3>
                        <div id="tablaInventariosBody"></div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals (Simplified for brevity, but you'd include all from Modales.html) -->
    <div id="modalFirmaElectronica" class="fixed inset-0 bg-slate-900/75 z-[60] hidden items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-96">
            <h3 class="text-lg font-bold mb-2">Firma Electrónica</h3>
            <input type="password" id="inputFirmaPassword" class="w-full border p-2 rounded mb-4" placeholder="Contraseña">
            <div class="flex justify-end gap-2">
                <button onclick="cerrarModalFirma()" class="px-4 py-2 bg-slate-200 rounded">Cancelar</button>
                <button onclick="ejecutarFirmaDictamen()" class="px-4 py-2 bg-indigo-600 text-white rounded">Firmar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="supabase_client.js"></script>
    <script src="supabase_functions.js"></script>
    
    <!-- Original Scripts.html logic (Simplified) -->
    <script>
        // Use the original Scripts.html logic here, but it's now decoupled from GAS
        // The Proxy in supabase_functions.js handles google.script.run
    </script>

    <!-- For this migration, I'll provide a unified script that replaces Scripts.html -->
    <script src="Scripts.js"></script>
</body>
</html>
